name: Python Application CI

# Die Pipeline startet bei jedem Push oder Pull Request auf den Branch 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem Repository auschecken
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Python-Umgebung auf dem GitHub-Server einrichten
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    # 3. Abhängigkeiten installieren
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Syntax-Check (Linting) durchführen
    - name: Lint with flake8 (Syntax-Check)
      run: |
        # Installiere ein Tool, das den Code auf Syntaxfehler prüft
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics